name: CI Groupe7

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build_Groupe7:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm install

      - name: Lancer les tests
        run: npm test